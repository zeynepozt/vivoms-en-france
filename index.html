<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vivons en France</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600;9..144,700&family=DM+Sans:wght@400;500;600&display=swap');
  :root { --paper:#F7F2EA; --ink:#3A3530; --rouge:#B8553F; --bleu:#5B7C8A; --gold:#C9A24B; --soft:#EAE1D2; --line:#D8CCB8; }
  * { margin:0; padding:0; box-sizing:border-box; }
  html,body { height:100%; }
  body { font-family:'DM Sans',sans-serif; background:var(--paper); color:var(--ink); }

  /* ---- SCENE SYSTEM ---- */
  .screen { display:none; }
  .screen.active { display:block; }

  /* ===== AVATAR SCREEN ===== */
  #avatarScreen { min-height:100vh; display:none; flex-direction:column; align-items:center; padding:24px 16px 48px; background:var(--paper); background-image:radial-gradient(circle at 1px 1px, rgba(58,53,48,0.04) 1px, transparent 0); background-size:22px 22px; }
  #avatarScreen.active { display:flex; }
  .eyebrow { font-size:12px; letter-spacing:0.22em; text-transform:uppercase; color:var(--rouge); font-weight:600; margin-bottom:6px; }
  h1 { font-family:'Fraunces',serif; font-size:34px; font-weight:600; line-height:1.05; text-align:center; margin-bottom:4px; }
  .sub { font-size:14px; color:#8A7E6E; text-align:center; margin-bottom:22px; max-width:330px; }
  .stage { width:210px; height:210px; border-radius:50%; background:radial-gradient(circle at 50% 35%, #FBF6EC, #E6DAC6); border:3px solid var(--ink); position:relative; overflow:hidden; margin-bottom:8px; box-shadow:6px 6px 0 rgba(58,53,48,0.12); }
  .stage svg { width:100%; height:100%; display:block; }
  .avatar-name { font-family:'Fraunces',serif; font-size:20px; margin-bottom:20px; min-height:26px; }
  .panel { width:100%; max-width:400px; background:#fff; border:2px solid var(--ink); border-radius:18px; padding:18px; box-shadow:5px 5px 0 rgba(58,53,48,0.1); }
  .arow { margin-bottom:18px; } .arow:last-child { margin-bottom:0; }
  .row-label { font-size:12px; letter-spacing:0.12em; text-transform:uppercase; font-weight:600; color:#9A8E7E; margin-bottom:8px; }
  .swatches { display:flex; gap:8px; flex-wrap:wrap; }
  .swatch { width:36px; height:36px; border-radius:10px; border:2px solid var(--line); cursor:pointer; transition:transform .12s, border-color .12s; }
  .swatch:hover { transform:translateY(-2px); }
  .swatch.active { border-color:var(--ink); border-width:3px; transform:translateY(-2px); }
  .opt-row { display:flex; gap:8px; flex-wrap:wrap; }
  .opt { padding:8px 14px; border:2px solid var(--line); border-radius:999px; background:#fff; font-family:'DM Sans',sans-serif; font-size:13px; font-weight:500; cursor:pointer; transition:all .12s; }
  .opt:hover { border-color:var(--ink); }
  .opt.active { background:var(--ink); color:var(--paper); border-color:var(--ink); }
  .name-input { width:100%; padding:11px 14px; border:2px solid var(--line); border-radius:12px; font-family:'DM Sans',sans-serif; font-size:15px; color:var(--ink); background:var(--paper); }
  .name-input:focus { outline:none; border-color:var(--bleu); }
  .cta { width:100%; max-width:400px; margin-top:20px; padding:15px; background:var(--rouge); color:#fff; border:2px solid var(--ink); border-radius:14px; font-family:'Fraunces',serif; font-size:17px; font-weight:600; cursor:pointer; box-shadow:4px 4px 0 var(--ink); transition:transform .1s, box-shadow .1s; }
  .cta:hover { transform:translate(-2px,-2px); box-shadow:6px 6px 0 var(--ink); }
  .cta:active { transform:translate(2px,2px); box-shadow:1px 1px 0 var(--ink); }

  /* ===== HOTEL SCREEN ===== */
  #hotelScreen { position:relative; width:100%; height:100vh; overflow:hidden; background:#2a2630; }
  .topbar { position:absolute; top:0; left:0; right:0; z-index:30; display:flex; justify-content:space-between; align-items:center; padding:14px 18px; background:linear-gradient(to bottom, rgba(0,0,0,0.28), transparent); }
  .roomtag { font-family:'Fraunces',serif; color:#fff; font-size:15px; letter-spacing:0.04em; opacity:0.92; text-shadow:0 1px 4px rgba(0,0,0,0.3); }
  .hint { font-size:12px; color:#fff; opacity:0.85; background:rgba(0,0,0,0.22); padding:6px 12px; border-radius:999px; }
  svg.room { width:100%; height:100%; display:block; }
  .hotspot { cursor:pointer; }
  .glow { opacity:0; transition:opacity .3s; }
  .hotspot:hover .glow { opacity:1; }
  .label-pin { opacity:0; transition:opacity .2s; pointer-events:none; }
  .hotspot:hover .label-pin { opacity:1; }
  .overlay { position:absolute; inset:0; background:rgba(30,26,24,0.5); z-index:40; display:none; align-items:center; justify-content:center; padding:24px; backdrop-filter:blur(3px); }
  .overlay.show { display:flex; }
  .card { background:var(--paper); border:1.5px solid var(--gold); border-radius:20px; max-width:380px; width:100%; padding:26px; box-shadow:0 20px 50px rgba(0,0,0,0.35); animation:pop .25s ease; }
  @keyframes pop { from{transform:scale(0.92) translateY(8px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
  .card .ceyebrow { font-size:11px; letter-spacing:0.2em; text-transform:uppercase; color:var(--rouge); font-weight:600; margin-bottom:8px; }
  .card h2 { font-family:'Fraunces',serif; font-size:24px; margin-bottom:6px; line-height:1.1; }
  .card .fr { font-size:15px; color:#8A7E6E; font-style:italic; margin-bottom:14px; }
  .card p { font-size:14px; line-height:1.55; margin-bottom:20px; color:#4a443c; }
  .card .actions { display:flex; gap:10px; flex-wrap:wrap; }
  .btn { padding:11px 18px; border:1.5px solid var(--ink); border-radius:12px; font-family:'DM Sans',sans-serif; font-weight:600; font-size:14px; cursor:pointer; background:#fff; transition:transform .1s, background .15s; }
  .btn:active { transform:scale(0.96); }
  .btn.primary { background:var(--rouge); color:#fff; border-color:var(--rouge); }
  .btn.primary:hover { background:#a4452f; }
</style>
</head>
<body>

<script>
/* ============ AVATAR LOGIC ============ */
const S={ skin:'#F2D3B1', ear:'#E6B98E', hairCol:'#2c1b18', hairStyle:'long', cloth:'tshirt', clothCol:'#2E5A6B', lip:'#C4604F' };
const $=id=>document.getElementById(id);
const head=$('head'),neck=$('neck'),earL=$('earL'),earR=$('earR'),hairFront=$('hairFront'),hairBack=$('hairBack'),
  clothing=$('clothing'),glasses=$('glasses'),earrings=$('earrings'),hat=$('hat'),brows=$('brows'),mouth=$('mouth');
const hairFrontPaths={
  long:"M48 118 Q44 40 120 40 Q196 40 192 118 Q190 78 120 72 Q50 78 48 118 Z",
  wavy:"M48 118 Q40 38 120 40 Q200 38 192 118 Q196 80 175 78 Q185 64 120 66 Q55 64 65 78 Q44 80 48 118 Z",
  pony:"M52 116 Q48 44 120 44 Q192 44 188 116 Q188 80 120 74 Q52 80 52 116 Z",
  bun:"M52 116 Q48 44 120 44 Q192 44 188 116 Q188 80 120 74 Q52 80 52 116 Z",
  bob:"M46 140 Q42 42 120 40 Q198 42 194 140 Q190 84 120 78 Q50 84 46 140 Z",
  short:"M52 110 Q50 46 120 46 Q190 46 188 110 Q188 76 120 70 Q52 76 52 110 Z",
  curly:"M46 120 Q36 40 120 38 Q204 40 194 120 Q200 76 120 70 Q40 76 46 120 Z"};
const hairBackPaths={
  long:"M44 100 Q36 210 80 214 Q66 160 66 110 L174 110 Q174 160 160 214 Q204 210 196 100 Z",
  wavy:"M42 100 Q30 195 78 212 Q66 200 70 175 Q58 195 84 200 Q70 155 70 110 L170 110 Q170 155 156 200 Q182 195 170 175 Q174 200 162 212 Q210 195 198 100 Z",
  pony:"M186 86 Q224 118 210 180 Q202 214 184 188 Q198 150 184 110 Z",
  bun:"", bob:"", short:"",
  curly:"M40 110 Q28 180 82 192 Q60 180 68 150 L172 150 Q180 180 158 192 Q212 180 200 110 Z"};
function renderHair(){
  hairBack.setAttribute('d', hairBackPaths[S.hairStyle]||''); hairBack.setAttribute('fill', S.hairCol);
  hairFront.setAttribute('d', hairFrontPaths[S.hairStyle]||''); hairFront.setAttribute('fill', S.hairCol);
  let knob=$('bunKnob');
  if(S.hairStyle==='bun'){ if(!knob){knob=document.createElementNS('http://www.w3.org/2000/svg','circle');knob.id='bunKnob';$('avatar').insertBefore(knob, hairFront);}
    knob.setAttribute('cx',120);knob.setAttribute('cy',38);knob.setAttribute('r',20);knob.setAttribute('fill',S.hairCol);
  } else if(knob){knob.remove();}
  let tie=$('ponyTie');
  if(S.hairStyle==='pony'){ if(!tie){tie=document.createElementNS('http://www.w3.org/2000/svg','circle');tie.id='ponyTie';$('avatar').appendChild(tie);}
    tie.setAttribute('cx',190);tie.setAttribute('cy',96);tie.setAttribute('r',7);tie.setAttribute('fill','#00000033');
  } else if(tie){tie.remove();}
}
function renderClothing(){ const c=S.clothCol; let svg='';
  if(S.cloth==='tshirt'){ svg=`<path d="M62 240 Q60 196 120 184 Q180 196 178 240 Z" fill="${c}"/>`; }
  else if(S.cloth==='marin'){ svg=`<path d="M62 240 Q60 196 120 184 Q180 196 178 240 Z" fill="#F0EDE4"/>
    <clipPath id="mc"><path d="M62 240 Q60 196 120 184 Q180 196 178 240 Z"/></clipPath>
    <g clip-path="url(#mc)"><rect x="55" y="196" width="130" height="7" fill="#2E5A6B"/><rect x="55" y="211" width="130" height="7" fill="#2E5A6B"/><rect x="55" y="226" width="130" height="7" fill="#2E5A6B"/></g>`; }
  else if(S.cloth==='blazer'){ svg=`<path d="M62 240 Q60 196 120 184 Q180 196 178 240 Z" fill="${c}"/>
    <path d="M120 184 L100 240 L120 218 L140 240 Z" fill="#F2EEE4"/><path d="M120 184 L96 206 M120 184 L144 206" stroke="rgba(0,0,0,0.22)" stroke-width="2.5" fill="none"/>`; }
  else if(S.cloth==='trench'){ svg=`<path d="M58 240 Q58 192 120 182 Q182 192 182 240 Z" fill="#D9C7A8"/>
    <line x1="120" y1="186" x2="120" y2="240" stroke="rgba(0,0,0,0.18)" stroke-width="2.5"/>
    <circle cx="108" cy="210" r="2.5" fill="rgba(0,0,0,0.3)"/><circle cx="108" cy="226" r="2.5" fill="rgba(0,0,0,0.3)"/>
    <path d="M92 188 L120 200 L148 188" fill="none" stroke="rgba(0,0,0,0.18)" stroke-width="2.5"/>`; }
  else if(S.cloth==='dress'){ svg=`<path d="M66 240 Q70 192 120 184 Q170 192 174 240 Z" fill="${c}"/><path d="M120 184 L120 240" stroke="rgba(255,255,255,0.18)" stroke-width="3"/>`; }
  clothing.innerHTML=svg; }
function renderBrows(){ brows.innerHTML=`<path d="M80 98 Q95 92 110 98"/><path d="M130 98 Q145 92 160 98"/>`; brows.setAttribute('stroke', S.hairCol); }
function renderMouth(){ mouth.innerHTML=`<path d="M104 152 Q120 166 136 152 Q120 160 104 152 Z" fill="${S.lip}"/>`; }
function setActive(c,el){ c.querySelectorAll('.active').forEach(n=>n.classList.remove('active')); el.classList.add('active'); }
$('skin').addEventListener('click',e=>{ if(!e.target.dataset.c)return; S.skin=e.target.dataset.c; S.ear=e.target.dataset.e;
  head.setAttribute('fill',S.skin); neck.setAttribute('fill',S.ear); earL.setAttribute('fill',S.ear); earR.setAttribute('fill',S.ear); setActive(e.currentTarget,e.target); });
$('hairColor').addEventListener('click',e=>{ if(!e.target.dataset.c)return; S.hairCol=e.target.dataset.c; renderHair(); renderBrows(); setActive(e.currentTarget,e.target); });
$('hairStyle').addEventListener('click',e=>{ if(!e.target.dataset.s)return; S.hairStyle=e.target.dataset.s; renderHair(); setActive(e.currentTarget,e.target); });
$('clothType').addEventListener('click',e=>{ if(!e.target.dataset.t)return; S.cloth=e.target.dataset.t; renderClothing(); setActive(e.currentTarget,e.target); });
$('clothColor').addEventListener('click',e=>{ if(!e.target.dataset.c)return; S.clothCol=e.target.dataset.c; renderClothing(); setActive(e.currentTarget,e.target); });
$('lipColor').addEventListener('click',e=>{ if(!e.target.dataset.c)return; S.lip=e.target.dataset.c; renderMouth(); setActive(e.currentTarget,e.target); });
$('glassesOpt').addEventListener('click',e=>{ if(!e.target.dataset.g)return; const g=e.target.dataset.g;
  if(g==='off'){ glasses.style.display='none'; }
  else if(g==='round'){ glasses.style.display='block'; glasses.innerHTML=`<circle cx="95" cy="116" r="18"/><circle cx="145" cy="116" r="18"/><line x1="113" y1="116" x2="127" y2="116"/>`; }
  else if(g==='square'){ glasses.style.display='block'; glasses.innerHTML=`<rect x="78" y="102" width="34" height="28" rx="5"/><rect x="128" y="102" width="34" height="28" rx="5"/><line x1="112" y1="116" x2="128" y2="116"/>`; }
  setActive(e.currentTarget,e.target); });
$('earOpt').addEventListener('click',e=>{ if(!e.target.dataset.e)return; earrings.style.display=e.target.dataset.e==='on'?'block':'none'; setActive(e.currentTarget,e.target); });
$('hatOpt').addEventListener('click',e=>{ if(!e.target.dataset.h)return;
  if(e.target.dataset.h==='off'){ hat.style.display='none'; }
  else { hat.style.display='block'; hat.innerHTML=`<ellipse cx="120" cy="50" rx="62" ry="26" fill="#C4452F"/><ellipse cx="120" cy="44" rx="52" ry="20" fill="#A83926"/><circle cx="145" cy="34" r="6" fill="#8B2A1E"/>`; }
  setActive(e.currentTarget,e.target); });
$('nameInput').addEventListener('input',()=>{ $('nameDisplay').textContent=$('nameInput').value?`« ${$('nameInput').value} »`:''; });

/* ============ SCENE TRANSITION ============ */
let cameFromHotel=false;
function showAvatar(){ $('hotelScreen').classList.remove('active'); $('avatarScreen').classList.add('active'); window.scrollTo(0,0); }
function showHotel(){ $('avatarScreen').classList.remove('active'); $('hotelScreen').classList.add('active'); window.scrollTo(0,0); }
$('go').addEventListener('click',()=>{ showHotel(); });

/* ============ HOTEL LOGIC ============ */
const ov=$('ov'); const card=$('card');
const dialogs={
  window:{ ce:'La fenêtre · Pencere', title:'Paris uyanıyor', fr:'« Quelle belle vue ! »',
    p:'Pencereden yumuşak sabah ışığı süzülüyor. Aşağıda dar bir sokak, çatıların arasından uzakta hafifçe Eiffel Kulesi. Şehir seni bekliyor.',
    actions:[{t:'Biraz daha izle',cls:'btn'},{t:'Dışarı çıkmaya hazırım →',cls:'btn primary'}] },
  phone:{ ce:'Le téléphone · Telefon', title:'Bir mesajın var', fr:'« Bienvenue à Paris ! »',
    p:'Otelden karşılama: "Bienvenue ! Kahvaltı 7-10 arası, zemin katta." Tam anlamadıysan sorun değil — yavaş yavaş alışacaksın.',
    actions:[{t:'Kapat',cls:'btn'}] },
  door:{ ce:'La porte · Kapı', title:'Şehre çıkalım mı?', fr:'« On y va ? »',
    p:'Kapının ardında Paris sokakları var. Hazırsan çık — istediğin yere gidebilir, istediğinle konuşabilirsin. Acele yok.',
    actions:[{t:'Henüz değil',cls:'btn'},{t:'Şehre çık →',cls:'btn primary'}] }
};
function openD(key){ const d=dialogs[key];
  let btns=d.actions.map(a=>`<button class="${a.cls}">${a.t}</button>`).join('');
  card.innerHTML=`<div class="ceyebrow">${d.ce}</div><h2>${d.title}</h2><div class="fr">${d.fr}</div><p>${d.p}</p><div class="actions">${btns}</div>`;
  ov.classList.add('show');
  card.querySelectorAll('.btn').forEach(b=>b.addEventListener('click',()=>ov.classList.remove('show'))); }
$('hsWindow').addEventListener('click',()=>openD('window'));
$('hsPhone').addEventListener('click',()=>openD('phone'));
$('hsDoor').addEventListener('click',()=>openD('door'));
$('hsSuitcase').addEventListener('click',()=>{ cameFromHotel=true; $('go').textContent='✓ Hazır → odaya dön'; showAvatar(); });
ov.addEventListener('click',e=>{ if(e.target===ov) ov.classList.remove('show'); });

/* init */
renderHair(); renderClothing(); renderBrows(); renderMouth();
</script>
</body>
</html>
